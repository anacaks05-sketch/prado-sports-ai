<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#050505" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Prado IA" />
  <meta name="description" content="Scanner inteligente de jogos e gerador de bilhetes Prado IA." />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
  <title>Prado IA</title>
</head>
<body>
  <main class="app-shell">
    <header class="top-brand">
      <div class="pai-logo"><span>PAI</span></div>
      <div>
        <h1>PRADO <em>IA</em></h1>
        <p>Inteligência para apostas esportivas</p>
      </div>
      <button id="installBtn" class="install hidden">Instalar</button>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="scanner">Scanner</button>
      <button class="tab" data-tab="jogos">Jogos</button>
      <button class="tab" data-tab="bilhete">Bilhete</button>
    </nav>

    <section id="scanner" class="panel active">
      <div class="scanner-card compact-card">
        <div class="section-head">
          <div class="icon-tile">☷</div>
          <div>
            <h2>Scanner de alto valor</h2>
            <p>Escolha o tipo de mercado e a linha desejada</p>
          </div>
        </div>

        <div class="form-grid">
          <label><span>Tipo de Mercado</span>
            <select id="marketType">
              <option value="match_goals">Gols na Partida</option>
              <option value="first_half_goals">Gols 1º Tempo</option>
              <option value="btts">Ambos Times Marcam</option>
              <option value="corners">Escanteios Partida</option>
              <option value="cards">Cartões na Partida</option>
              <option value="games_goals">Jogos para Gols</option>
            </select>
          </label>

          <label><span>Linha</span>
            <select id="lineSelect"></select>
          </label>

          <label><span>Quantidade</span>
            <select id="qtySelect">
              <option value="2">2 jogos</option>
              <option value="3" selected>3 jogos</option>
              <option value="4">4 jogos</option>
              <option value="5">5 jogos</option>
              <option value="6">6 jogos</option>
              <option value="7">7 jogos</option>
              <option value="8">8 jogos</option>
            </select>
          </label>

          <label><span>Data</span><input id="date" type="date" /></label>
        </div>

        <div id="searchPreview" class="search-preview">Buscando: Over +1.5 Gols FT</div>
        <button id="scanBtn" class="scan-button">Iniciar scan</button>
      </div>
    </section>

    <section id="jogos" class="panel">
      <div id="gamesList" class="league-list"></div>
      <button id="generateFromGames" class="scan-button sticky-generate">Gerar bilhete IA</button>
    </section>

    <section id="bilhete" class="panel">
      <div class="ticket-builder compact-card">
        <h3>Escolha o perfil do bilhete</h3>
        <div class="risk-cards">
          <button class="risk-card leve" data-risk="leve"><b>🛡️ LEVE</b><small>Odds de 2.00 a 5.00</small><small>Maior taxa de acerto</small><small>2 a 4 seleções</small><span></span></button>
          <button class="risk-card active moderado" data-risk="moderado"><b>🛡️ MODERADA</b><small>Odds de 5.00 a 20.00</small><small>Equilíbrio risco/retorno</small><small>3 a 8 seleções</small><span></span></button>
          <button class="risk-card agressivo" data-risk="agressivo"><b>🛡️ AGRESSIVA</b><small>Odds de 20.00 a 100.00</small><small>Alto retorno</small><small>5 a 15 seleções</small><span></span></button>
        </div>
        <button id="generateTicket" class="scan-button gold-btn">Gerar bilhete IA</button>
      </div>

      <div id="ticketEmpty" class="empty-ticket">
        <strong>Nenhum bilhete gerado</strong>
        <p>Faça o scan dos jogos e clique em “Gerar bilhete IA”.</p>
      </div>
      <div id="ticket" class="ticket-slip hidden"></div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
