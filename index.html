<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#050505" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Prado IA" />
  <meta name="description" content="Scanner inteligente de jogos e gerador de bilhetes Prado IA." />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
  <title>Prado IA</title>
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">PRADO IA</p>
        <h1>Scanner premium de bilhetes</h1>
        <p>Jogos reais de hoje, probabilidades simuladas e 3 perfis de risco.</p>
      </div>
      <button id="installBtn" class="ghost hidden">Instalar app</button>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="scanner">🔍 Scanner</button>
      <button class="tab" data-tab="bilhete">🎫 Bilhete</button>
      <button class="tab" data-tab="jogos">⚽ Jogos</button>
    </nav>

    <section id="scanner" class="panel active">
      <div class="filters card">
        <label>Mercado
          <select id="market">
            <option value="over15">Over 1.5 gols</option>
            <option value="over25">Over 2.5 gols</option>
            <option value="home">Vitória mandante</option>
            <option value="both">Ambas marcam</option>
          </select>
        </label>
        <label>Data
          <input id="date" type="date" />
        </label>
        <label>Qtd. jogos
          <input id="limit" type="number" min="2" max="20" value="8" />
        </label>
        <button id="scanBtn">Buscar jogos</button>
      </div>
      <div id="status" class="status">Carregando jogos de hoje...</div>
      <div id="scanResults" class="grid"></div>
    </section>

    <section id="bilhete" class="panel">
      <div class="risk-row">
        <button class="risk active" data-risk="leve">🛡️ Leve</button>
        <button class="risk" data-risk="moderado">⚖️ Moderado</button>
        <button class="risk" data-risk="agressivo">🔥 Agressivo</button>
      </div>
      <div id="ticket" class="ticket card"></div>
    </section>

    <section id="jogos" class="panel">
      <div id="gamesList" class="league-list"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
