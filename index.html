<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#050505" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Prado IA" />
  <meta name="description" content="Scanner inteligente de jogos e gerador de bilhetes Prado IA." />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
  <title>Prado IA</title>
</head>
<body>
  <main class="app-shell">
    <header class="top-brand">
      <div class="logo-box">⌖</div>
      <div>
        <h1>Prado Signal IA</h1>
        <p>Powered by Artificial Intelligence</p>
      </div>
      <button id="installBtn" class="install hidden">Instalar</button>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="scanner">Scanner</button>
      <button class="tab" data-tab="bilhete">Bilhete</button>
      <button class="tab" data-tab="jogos">Jogos</button>
    </nav>

    <section id="scanner" class="panel active">
      <div class="scanner-card">
        <div class="card-title">
          <div class="icon-tile">☷</div>
          <div>
            <h2>Scanner de alto valor</h2>
            <p>Escolha o mercado, a linha e a data desejada</p>
          </div>
        </div>

        <div class="form-grid">
          <label><span>▥ Tipo de mercado</span>
            <select id="market">
              <option value="over15">Gols na partida</option>
              <option value="over25">Gols na partida</option>
              <option value="home">Resultado final</option>
              <option value="both">Ambas marcam</option>
            </select>
          </label>
          <label><span>↗ Linha</span>
            <select id="line">
              <option value="over15">Over +1.5</option>
              <option value="over25">Over +2.5</option>
              <option value="home">Vitória mandante</option>
              <option value="both">Sim</option>
            </select>
          </label>
          <label><span class="green">◎ Quantidade</span>
            <input id="limit" type="number" min="1" max="20" value="8" />
          </label>
          <label><span>▣ Data</span>
            <input id="date" type="date" />
          </label>
        </div>

        <div id="searchPreview" class="search-preview">⌕ Buscando: +1.5 Gols FT</div>
        <button id="scanBtn" class="scan-button">⌖ Iniciar scan</button>
      </div>

      <div id="status" class="status">Carregando jogos de hoje...</div>
      <div id="scanResults" class="results-list"></div>
    </section>

    <section id="bilhete" class="panel">
      <div class="risk-row">
        <button class="risk active" data-risk="leve">Leve</button>
        <button class="risk" data-risk="moderado">Moderado</button>
        <button class="risk" data-risk="agressivo">Agressivo</button>
      </div>
      <div id="ticket" class="ticket"></div>
    </section>

    <section id="jogos" class="panel">
      <div id="gamesList" class="league-list"></div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
