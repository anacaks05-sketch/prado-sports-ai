<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#050505" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Prado IA" />
  <meta name="description" content="Scanner inteligente de jogos e gerador de bilhetes Prado IA." />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
  <title>Prado IA</title>
</head>
<body>
  <main class="app-shell">
    <header class="brand-hero">
      <div class="pai-logo"><span>PAI</span><i></i></div>
      <div class="brand-copy">
        <h1>PRADO <em>IA</em></h1>
        <p>POWERED BY ARTIFICIAL INTELLIGENCE</p>
      </div>
      <button id="installBtn" class="install hidden">Instalar</button>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="scanner">Scanner</button>
      <button class="tab" data-tab="bilhete">Bilhete</button>
      <button class="tab" data-tab="jogos">Jogos</button>
    </nav>

    <section id="scanner" class="panel active">
      <div class="scanner-card">
        <div class="section-head">
          <div class="icon-tile">☰</div>
          <div>
            <h2>Scanner de alto valor</h2>
            <p>Escolha o mercado e encontre as melhores oportunidades do dia</p>
          </div>
        </div>
        <div class="form-grid">
          <label><span>Tipo de mercado</span>
            <select id="market"><option value="goals">Gols na partida</option><option value="home">Resultado final</option><option value="both">Ambas marcam</option></select>
          </label>
          <label><span>Over / Under</span>
            <select id="ou"><option value="over">Over (+)</option><option value="under">Under (-)</option></select>
          </label>
          <label><span>Quantidade</span>
            <select id="line"><option value="05">+0.5</option><option value="15" selected>+1.5</option><option value="25">+2.5</option><option value="35">+3.5</option></select>
          </label>
          <label><span>Data</span><input id="date" type="date" /></label>
        </div>
        <div id="searchPreview" class="search-preview">Buscando: +1.5 Gols FT</div>
        <button id="scanBtn" class="scan-button">Iniciar scan</button>
      </div>
    </section>

    <section id="bilhete" class="panel">
      <div class="ticket-builder">
        <h3>1. Escolha o perfil do bilhete</h3>
        <div class="risk-cards">
          <button class="risk-card active leve" data-risk="leve"><b>🛡️ LEVE</b><small>Odds de 2.00 a 5.00</small><small>Maior taxa de acerto</small><small>2 a 4 seleções</small><span></span></button>
          <button class="risk-card moderado" data-risk="moderado"><b>🛡️ MODERADA</b><small>Odds de 5.00 a 20.00</small><small>Equilíbrio risco/retorno</small><small>3 a 8 seleções</small><span></span></button>
          <button class="risk-card agressivo" data-risk="agressivo"><b>🛡️ AGRESSIVA</b><small>Odds de 20.00 a 100.00</small><small>Alto retorno</small><small>5 a 15 seleções</small><span></span></button>
        </div>
        <button id="generateTicket" class="scan-button gold-btn">Gerar bilhete</button>
      </div>
      <div id="ticket" class="ticket-slip"></div>
    </section>

    <section id="jogos" class="panel"><div id="gamesList" class="league-list"></div></section>
  </main>
  <script src="app.js"></script>
</body>
</html>
