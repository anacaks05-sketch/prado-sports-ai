<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0B0B0B" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Prado IA" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
  <title>Prado IA</title>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="brand-mark" aria-label="Prado IA logo">
        <span>P</span>
      </div>
      <div class="brand-copy">
        <h1>PRADO IA</h1>
        <p>Sports Intelligence</p>
      </div>
      <div class="status-pill">PRO</div>
    </header>

    <nav class="tabs" aria-label="Navegação principal">
      <button class="tab active" data-tab="scanner">Scanner</button>
      <button class="tab" data-tab="jogos">Jogos</button>
      <button class="tab" data-tab="bilhete">Bilhete</button>
    </nav>

    <section id="scanner" class="screen active-screen">
      <div class="glass-card scanner-card">
        <div class="section-head compact">
          <div>
            <span class="eyebrow">Scanner IA</span>
            <h2>Buscar oportunidades</h2>
          </div>
          <span class="live-dot">Hoje</span>
        </div>

        <div class="field-grid">
          <label class="field">
            <span>Mercado</span>
            <select id="marketSelect">
              <option value="gols">Gols na Partida</option>
              <option value="gols_ht">Gols 1º Tempo</option>
              <option value="ambos">Ambos Marcam</option>
              <option value="escanteios">Escanteios</option>
              <option value="cartoes">Cartões</option>
              <option value="jogos_gols">Jogos para Gols</option>
            </select>
          </label>

          <label class="field">
            <span>Linha</span>
            <select id="lineSelect"></select>
          </label>

          <label class="field">
            <span>Quantidade</span>
            <select id="quantitySelect">
              <option value="2">2 Jogos</option>
              <option value="3">3 Jogos</option>
              <option value="4" selected>4 Jogos</option>
              <option value="5">5 Jogos</option>
              <option value="6">6 Jogos</option>
              <option value="7">7 Jogos</option>
              <option value="8">8 Jogos</option>
            </select>
          </label>

          <label class="field">
            <span>Data</span>
            <input id="dateInput" type="date" />
          </label>
        </div>

        <button id="scanBtn" class="primary-btn">Iniciar Scan</button>
      </div>

      <div class="mini-dashboard">
        <div class="metric-card">
          <span>Modelo</span>
          <strong>V9</strong>
        </div>
        <div class="metric-card">
          <span>Perfil</span>
          <strong>Premium</strong>
        </div>
        <div class="metric-card">
          <span>Status</span>
          <strong>Online</strong>
        </div>
      </div>
    </section>

    <section id="jogos" class="screen">
      <div class="section-head">
        <div>
          <span class="eyebrow">Oportunidades</span>
          <h2>Jogos</h2>
        </div>
        <button id="generateTicketBtn" class="mini-btn">Gerar Bilhete IA</button>
      </div>
      <div id="gamesList" class="games-list"></div>
    </section>

    <section id="bilhete" class="screen">
      <div class="section-head">
        <div>
          <span class="eyebrow">Dashboard</span>
          <h2>Bilhete</h2>
        </div>
      </div>
      <div id="ticketArea" class="ticket-empty">
        <div class="empty-icon">◈</div>
        <h3>Nenhum bilhete gerado</h3>
        <p>Faça um scan e toque em “Gerar Bilhete IA”.</p>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
