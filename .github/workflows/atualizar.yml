name: Atualizar Prado Sports AI

on:
  schedule:
    - cron: "0 11 * * *" # 08:00 no Brasil
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar projeto
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar bibliotecas
        run: pip install requests

      - name: Rodar script
        env:
          API_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python top5_prado.py

      - name: Salvar atualização
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add dados.json bilhete.json
          git commit -m "Atualizar jogos do dia" || echo "Sem mudanças"
          git push
